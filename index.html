<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wormunglus</title>
    <link rel="icon" type="image/x-icon" href="1686.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="words.js" defer></script>
    <script src="logic.js"></script>
  </head>
  <body>
    <header>
      <h1>Wormunglus</h1>
      <p>Drawing with Wordle!</p>
    </header>

    <div class="layout">
      <div class="grid-panel">
        <div class="grid" id="grid"></div>
        <button class="btn-reset" id="resetBtn">Reset Grid</button>
      </div>

      <div class="search-panel">
        <h2 class="search-label">Today's Word</h2>
        <div class="word-input-row">
          <input
            class="word-input"
            id="wordInput"
            type="text"
            maxlength="5"
            placeholder="e.g. among"
          />
          <button class="btn-find" id="findBtn">Find</button>
        </div>
        <div class="results-box" id="resultsBox"></div>
      </div>
    </div>

    <script>
      const GUESSES = 6; // Rows
      const WORDLEN = 5; // Cols
      let grid = Array.from({ length: GUESSES }, () =>
        Array(WORDLEN).fill(WColor.GRAY),
      );

      // HACKY FUN :)
      if (GUESSES === 6 && WORDLEN === 5) {
        grid = [
          [".", "Y", "Y", "Y", "."],
          ["Y", "Y", ".", ".", "."],
          ["Y", "Y", "Y", "Y", "."],
          [".", "Y", "Y", "Y", "."],
          [".", "Y", ".", "Y", "."],
          ["G", "G", "G", "G", "G"],
        ];
      }

      // GRID PANEL
      function buildGrid() {
        const container = document.getElementById("grid");
        container.innerHTML = ""; // Clear the grid.
        for (let r = 0; r < GUESSES; r++) {
          for (let c = 0; c < WORDLEN; c++) {
            const tile = document.createElement("button");
            tile.className = "tile";
            tile.dataset.state = grid[r][c];
            tile.dataset.r = r;
            tile.dataset.c = c;
            tile.addEventListener("click", () => cycleTile(r, c, tile));
            container.appendChild(tile);
          }
        }
      }

      function cycleTile(row, col, tile) {
        const WCOLORS = [WColor.GRAY, WColor.GREEN, WColor.YELLOW];
        const i = WCOLORS.indexOf(grid[row][col]);
        grid[row][col] = WCOLORS[(i + 1) % WCOLORS.length];
        tile.dataset.state = grid[row][col];
      }

      document.getElementById("resetBtn").addEventListener("click", () => {
        grid = Array.from({ length: GUESSES }, () =>
          Array(WORDLEN).fill(WColor.GRAY),
        );
        buildGrid();
        resetStatus();
      });

      // SEARCH PANEL
      function resetStatus() {
        document.getElementById("resultsBox").innerHTML =
          '<div class="status-msg">Click the tiles, enter a word, and press find!</div>';
      }

      function runSearch() {
        const word = document
          .getElementById("wordInput")
          .value.trim()
          .toLowerCase();
        const box = document.getElementById("resultsBox");
        console.log(word);

        if (!word || word.length !== WORDLEN || !/^[a-z]+$/.test(word)) {
          box.innerHTML = `<div class="status-msg">You must enter a valid ${WORDLEN}-letter word.</div>`;
          return;
        }

        const patterns = grid.map((row) => row.join(""));
        const solutions = findSolution(word, WORDS, patterns);
        box.innerHTML = "";
        solutions.forEach((sol, i) => {
          const row = document.createElement("div");
          row.className = "result-row";
          row.style.animationDelay = `${i * 40}ms`;

          const num = document.createElement("span");
          num.className = "row-num";
          num.textContent = i + 1;

          const mini = document.createElement("div");
          mini.className = "mini-tiles";
          for (const ch of patterns[i]) {
            const tile = document.createElement("div");
            tile.className = "mini-tile";
            tile.dataset.state = ch;
            mini.appendChild(tile);
          }

          const guess = document.createElement("span");
          if (sol.length > 0) {
            guess.className = "result-word";
            // Choose a solution at random because I'm lazy.
            guess.textContent = sol[Math.floor(Math.random() * sol.length)];
          } else {
            guess.className = "result-none";
            guess.textContent = "no match found";
          }

          row.appendChild(num);
          row.appendChild(mini);
          row.appendChild(guess);
          box.appendChild(row);
        });
      }

      document.getElementById("findBtn").addEventListener("click", runSearch);
      document.getElementById("wordInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          runSearch();
        }
      });

      // INIT
      buildGrid();
      resetStatus();
    </script>
  </body>
</html>
