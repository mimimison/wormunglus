<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wormunglus</title>
    <link rel="icon" type="image/x-icon" href="1686.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="words.js" defer></script>
    <script src="logic.js"></script>
  </head>
  <body>
    <header>
      <h1>Wormunglus</h1>
      <p>
        Drawing with Wordle!
        <a href="https://github.com/mimimison/Wormunglus">GitHub</a>
      </p>
    </header>

    <div class="toast" id="toast"></div>

    <div class="layout">
      <div class="grid-panel">
        <div class="grid" id="grid"></div>
        <div class="grid-buttons">
          <div class="safe-buttons">
            <button class="btn-copy" id="copyBtn">Copy</button>
            <button class="btn-paste" , id="pasteBtn">Paste</button>
          </div>
          <button class="btn-reset" id="resetBtn">Reset Grid</button>
        </div>
      </div>

      <div class="search-panel">
        <h2 class="search-label">Today's Word</h2>
        <div class="word-input-row">
          <input
            class="word-input"
            id="wordInput"
            type="text"
            maxlength="5"
            placeholder="e.g. among"
          />
          <button class="btn-find" id="findBtn">Find</button>
        </div>
        <div class="results-box" id="resultsBox">
          <div class="status-msg">
            Click the tiles, enter a word, and press find!
          </div>
        </div>
      </div>
    </div>

    <script>
      const WCOLORS = [WColor.GRAY, WColor.GREEN, WColor.YELLOW];
      const EMOJIS = ["⬛", "🟩", "🟨"];

      const GUESSES = 6; // Rows
      const WORDLEN = 5; // Cols
      let grid = [
        [".", "Y", "Y", "Y", "."],
        ["Y", "Y", ".", ".", "."],
        ["Y", "Y", "Y", "Y", "."],
        [".", "Y", "Y", "Y", "."],
        [".", "Y", ".", "Y", "."],
        ["G", "G", "G", "G", "G"],
      ];

      function showToast(text) {
        const toast = document.getElementById("toast");
        toast.innerHTML = text;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // GRID PANEL
      function buildGrid() {
        const container = document.getElementById("grid");
        container.innerHTML = ""; // Clear the grid.
        for (let r = 0; r < GUESSES; r++) {
          for (let c = 0; c < WORDLEN; c++) {
            const tile = document.createElement("button");
            tile.className = "tile";
            tile.dataset.state = grid[r][c];
            tile.dataset.r = r;
            tile.dataset.c = c;
            tile.addEventListener("click", () => cycleTile(r, c, tile));
            container.appendChild(tile);
          }
        }
      }

      function cycleTile(row, col, tile) {
        const i = WCOLORS.indexOf(grid[row][col]);
        grid[row][col] = WCOLORS[(i + 1) % WCOLORS.length];
        tile.dataset.state = grid[row][col];
      }

      document.getElementById("copyBtn").addEventListener("click", () => {
        const text = grid
          .map((row) => row.map((e) => EMOJIS[WCOLORS.indexOf(e)]).join(""))
          .join("\n");
        try {
          navigator.clipboard.writeText(text);
          showToast("Copied grid to clipboard!");
        } catch (error) {
          showToast(error.message);
        }
      });

      function textToGrid(text) {
        const ERRMSG = "Clipboard must be a ~6x5 grid of ⬛🟩🟨";
        const rows = text.trim().split(/\r?\n/);
        if (rows.length > GUESSES) throw new Error(ERRMSG);
        const pasted = rows.map((row) => {
          const cells = Array.from(row.trim());
          if (cells.length !== WORDLEN) throw new Error(ERRMSG);
          return cells.map((emoji) => {
            const i = EMOJIS.indexOf(emoji);
            if (i === -1) throw new Error(ERRMSG);
            return WCOLORS[i];
          });
        });
        // Allow for pasting directly from Wordle website.
        for (let i = rows.length; i < GUESSES; i++) {
          pasted.push(Array(WORDLEN).fill(WColor.GRAY));
        }
        return pasted;
      }

      document
        .getElementById("pasteBtn")
        .addEventListener("click", async () => {
          try {
            const clipboardContents = await navigator.clipboard.read();
            for (const item of clipboardContents) {
              if (item.types.includes("text/plain")) {
                const blob = await item.getType("text/plain");
                let text = await blob.text();
                // Allow for pasting directly from Wordle website.
                text = text
                  .split("\n")
                  .filter((line) => !line.includes("Wordle"))
                  .join("\n");
                try {
                  grid = textToGrid(text);
                  buildGrid();
                  showToast("Pasted clipboard contents to grid!");
                } catch (error) {
                  showToast(error);
                }
              }
            }
          } catch (error) {
            showToast(error.message);
          }
        });

      document.getElementById("resetBtn").addEventListener("click", () => {
        grid = Array.from({ length: GUESSES }, () =>
          Array(WORDLEN).fill(WColor.GRAY),
        );
        buildGrid();
      });

      // SEARCH PANEL
      function search() {
        const word = document
          .getElementById("wordInput")
          .value.trim()
          .toLowerCase();
        const box = document.getElementById("resultsBox");

        if (!word || word.length !== WORDLEN || !/^[a-z]+$/.test(word)) {
          box.innerHTML = `<div class="status-msg">You must enter a valid ${WORDLEN}-letter word.</div>`;
          return;
        }

        const patterns = grid.map((row) => row.join(""));
        const solutions = findSolution(word, WORDS, patterns);
        box.innerHTML = ""; // Clear the results box.
        for (let i = 0; i < solutions.length; i++) {
          const row = document.createElement("div");
          row.className = "result-row";
          row.style.animationDelay = `${i * 20}ms`;

          const num = document.createElement("span");
          num.className = "row-num";
          num.textContent = i + 1;

          const mini = document.createElement("div");
          mini.className = "mini-tiles";
          for (const ch of patterns[i]) {
            const tile = document.createElement("div");
            tile.className = "mini-tile";
            tile.dataset.state = ch;
            mini.appendChild(tile);
          }

          const guess = document.createElement("span");
          if (solutions[i].length > 0) {
            guess.className = "result-word";
            // Choose a solution at random because I'm lazy.
            guess.textContent =
              solutions[i][Math.floor(Math.random() * solutions[i].length)];
          } else {
            guess.className = "result-none";
            guess.textContent = "no match found";
          }

          row.appendChild(num);
          row.appendChild(mini);
          row.appendChild(guess);
          box.appendChild(row);
        }
      }

      document.getElementById("findBtn").addEventListener("click", search);
      document.getElementById("wordInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          search();
        }
      });

      // INIT
      buildGrid();
    </script>
  </body>
</html>
